<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes"/>
<meta name="theme-color" content="#021A54"/>
<title>DocS — Share to PC</title>
<link rel="icon" type="image/svg+xml" href="/static/logo.svg">
<style>
* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #F8F5F0 0%, #FFFDF9 50%, #F8F5F0 100%);
    min-height: 100vh;
    padding: 24px 20px;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* Main container */
.container {
    width: 100%;
    max-width: 500px;
}

/* Header Section */
.app-header {
    text-align: center;
    margin-bottom: 28px;
}

.app-icon {
    font-size: 48px;
    margin-bottom: 8px;
}

.app-name {
    font-size: 32px;
    font-weight: 800;
    background: linear-gradient(135deg, #021A54, #FF85BB);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    letter-spacing: -0.5px;
}

.app-tagline {
    font-size: 13px;
    color: #8B8BA0;
    margin-top: 6px;
    font-weight: 500;
}

/* Glass Card - Main Upload Panel */
.upload-card {
    background: rgba(255, 255, 255, 0.85);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(2, 26, 84, 0.12);
    border-radius: 28px;
    padding: 24px;
    transition: all 0.3s ease;
    box-shadow: 0 4px 16px rgba(0, 0, 0, 0.04), 0 2px 4px rgba(0, 0, 0, 0.02);
}

.upload-card:hover {
    border-color: rgba(255, 133, 187, 0.35);
    box-shadow: 0 8px 32px rgba(2, 26, 84, 0.08);
}

/* Feature Badge Row */
.feature-badge {
    display: flex;
    justify-content: center;
    gap: 12px;
    margin-bottom: 24px;
    flex-wrap: wrap;
}

.badge {
    background: rgba(255, 133, 187, 0.12);
    backdrop-filter: blur(4px);
    padding: 6px 14px;
    border-radius: 40px;
    font-size: 11px;
    font-weight: 600;
    color: #021A54;
    border: 1px solid rgba(255, 133, 187, 0.2);
}

/* Drop Zone - Enhanced */
.drop-zone {
    background: #FFFFFF;
    border: 2px dashed rgba(2, 26, 84, 0.2);
    border-radius: 24px;
    padding: 48px 20px;
    text-align: center;
    cursor: pointer;
    position: relative;
    transition: all 0.25s ease;
    margin-bottom: 8px;
}

.drop-zone:hover {
    border-color: #FF85BB;
    background: rgba(255, 133, 187, 0.04);
    transform: scale(1.01);
    box-shadow: 0 4px 12px rgba(255, 133, 187, 0.1);
}

#file-input {
    position: absolute;
    inset: 0;
    opacity: 0;
    cursor: pointer;
}

.drop-icon {
    font-size: 56px;
    display: block;
    margin-bottom: 12px;
}

.drop-text {
    color: #021A54;
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 6px;
}

.drop-hint {
    font-size: 12px;
    color: #8B8BA0;
    font-weight: 500;
}

/* Supported formats */
.supported {
    text-align: center;
    margin-top: 16px;
    margin-bottom: 8px;
    font-size: 11px;
    color: #8B8BA0;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    flex-wrap: wrap;
}

.supported span {
    background: rgba(2, 26, 84, 0.06);
    padding: 4px 10px;
    border-radius: 20px;
    font-family: monospace;
    font-size: 10px;
    font-weight: 500;
    color: #021A54;
}

/* File List Section */
.file-section-title {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin: 20px 0 12px 0;
}

.file-section-title h4 {
    font-size: 13px;
    font-weight: 700;
    color: #021A54;
    text-transform: uppercase;
    letter-spacing: 0.5px;
}

.file-count {
    background: rgba(255, 133, 187, 0.15);
    padding: 4px 10px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 600;
    color: #FF85BB;
}

.file-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
    max-height: 320px;
    overflow-y: auto;
    padding-right: 4px;
}

/* Custom scrollbar for file list */
.file-list::-webkit-scrollbar {
    width: 4px;
}
.file-list::-webkit-scrollbar-track {
    background: rgba(2, 26, 84, 0.05);
    border-radius: 10px;
}
.file-list::-webkit-scrollbar-thumb {
    background: linear-gradient(135deg, #021A54, #FF85BB);
    border-radius: 10px;
}

/* File Item - Enhanced */
.file-item {
    background: rgba(255, 255, 255, 0.9);
    backdrop-filter: blur(4px);
    border: 1px solid rgba(2, 26, 84, 0.08);
    border-radius: 18px;
    padding: 12px 16px;
    position: relative;
    overflow: hidden;
    transition: all 0.2s ease;
}

.file-item:hover {
    border-color: rgba(255, 133, 187, 0.4);
    background: rgba(255, 133, 187, 0.04);
    transform: translateX(4px);
}

.progress {
    position: absolute;
    left: 0;
    top: 0;
    bottom: 0;
    width: 0%;
    background: linear-gradient(135deg, rgba(2, 26, 84, 0.1), rgba(255, 133, 187, 0.15));
    transition: width 0.3s ease;
    border-radius: 18px;
}

.file-row {
    display: flex;
    align-items: center;
    gap: 14px;
    position: relative;
    z-index: 1;
}

.file-icon {
    font-size: 26px;
    min-width: 36px;
    text-align: center;
}

.file-info {
    flex: 1;
}

.file-name {
    font-size: 14px;
    font-weight: 600;
    color: #000000;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    margin-bottom: 4px;
}

.file-meta {
    display: flex;
    gap: 12px;
    font-size: 10px;
    color: #8B8BA0;
}

.file-size {
    font-weight: 500;
}

.file-status {
    font-size: 18px;
    min-width: 40px;
    text-align: center;
}

/* Empty state */
.empty-state {
    text-align: center;
    padding: 40px 20px;
    color: #8B8BA0;
}

.empty-icon {
    font-size: 48px;
    opacity: 0.5;
    margin-bottom: 12px;
}

.empty-text {
    font-size: 13px;
    font-weight: 500;
}

/* Send Button - Premium Gradient */
.send-btn {
    width: 100%;
    margin-top: 24px;
    padding: 16px 28px;
    border-radius: 18px;
    border: none;
    font-weight: 700;
    font-size: 16px;
    background: linear-gradient(135deg, #021A54, #FF85BB);
    color: white;
    cursor: pointer;
    transition: all 0.25s ease;
    position: relative;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
}

.send-btn::before {
    content: '';
    position: absolute;
    top: 50%;
    left: 50%;
    width: 0;
    height: 0;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.25);
    transform: translate(-50%, -50%);
    transition: width 0.5s, height 0.5s;
}

.send-btn:hover:not(:disabled) {
    transform: translateY(-2px);
    box-shadow: 0 10px 28px rgba(2, 26, 84, 0.3), 0 4px 12px rgba(255, 133, 187, 0.25);
}

.send-btn:hover:not(:disabled)::before {
    width: 320px;
    height: 320px;
}

.send-btn:active:not(:disabled) {
    transform: translateY(1px);
}

.send-btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
    background: linear-gradient(135deg, #8B8BA0, #b0aeb8);
}

.btn-icon {
    font-size: 18px;
}

/* Status Card - Completion Screen */
.status-card {
    display: none;
    background: #FFFFFF;
    backdrop-filter: blur(10px);
    border: 1px solid rgba(2, 26, 84, 0.12);
    border-radius: 32px;
    padding: 48px 32px;
    text-align: center;
    box-shadow: 0 20px 40px rgba(0, 0, 0, 0.08);
    animation: fadeSlideUp 0.4s ease;
}

.status-icon-large {
    font-size: 72px;
    margin-bottom: 20px;
}

.status-title {
    font-size: 28px;
    font-weight: 800;
    background: linear-gradient(135deg, #021A54, #FF85BB);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    margin-bottom: 10px;
}

.status-message {
    font-size: 14px;
    color: #8B8BA0;
    margin-top: 8px;
    line-height: 1.5;
}

.status-note {
    margin-top: 24px;
    padding-top: 20px;
    border-top: 1px solid rgba(2, 26, 84, 0.08);
    font-size: 12px;
    color: #021A54;
    font-weight: 500;
}

/* PC Icon animation */
.pc-hint {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin-top: 16px;
    font-size: 12px;
    color: #FF85BB;
    background: rgba(255, 133, 187, 0.08);
    padding: 10px;
    border-radius: 40px;
    width: fit-content;
    margin-left: auto;
    margin-right: auto;
}

/* Animations */
.fade-out {
    animation: fadeOut 0.4s forwards;
}

@keyframes fadeSlideUp {
    from {
        opacity: 0;
        transform: translateY(20px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

@keyframes fadeOut {
    to {
        opacity: 0;
        transform: scale(0.96);
        visibility: hidden;
    }
}

/* Responsive */
@media (max-width: 480px) {
    body {
        padding: 16px;
    }
    .upload-card {
        padding: 18px;
    }
    .drop-zone {
        padding: 32px 16px;
    }
    .drop-icon {
        font-size: 44px;
    }
    .app-name {
        font-size: 28px;
    }
    .file-item {
        padding: 10px 12px;
    }
    .file-icon {
        font-size: 22px;
    }
    .file-name {
        font-size: 12px;
    }
    .status-card {
        padding: 36px 24px;
    }
    .status-title {
        font-size: 24px;
    }
}
</style>
</head>

<body>

<div class="container" id="appContainer">
    
    <!-- Header with Branding -->
    <div class="app-header">
        <img src="/static/logo.svg" alt="DocS AI" class="sidebar-logo" style="height:38px; width:auto;">
        <div class="app-name">DocS</div>
        <div class="app-tagline">Wireless file transfer</div>
    </div>

    <!-- Main Upload Card -->
    <div class="upload-card" id="main-card">
        
        <!-- Feature indicators -->
        <div class="feature-badge">
            <span class="badge">⚡ Instant sync</span>
            <span class="badge">📁 Auto-index</span>
        </div>

        <!-- Drop Zone -->
        <div class="drop-zone">
            <input type="file" id="file-input" multiple accept=".pdf,.txt,.jpg,.jpeg,.png,.csv,.docx,.doc"/>
            <span class="drop-icon">📂</span>
            <div class="drop-text">Choose files to send</div>
            <div class="drop-hint">Tap or drag & drop anywhere</div>
        </div>

        <!-- File List Section -->
        <div class="file-section-title" id="file-section-title" style="display: none;">
            <h4>📄 Selected files</h4>
            <div class="file-count" id="file-count">0</div>
        </div>
        
        <div class="file-list" id="file-list">
            <div class="empty-state" id="empty-state">
                <div class="empty-icon">📭</div>
                <div class="empty-text">No files selected yet</div>
            </div>
        </div>

        <!-- Send Button -->
        <button class="send-btn" id="send-btn" disabled>
            <span class="btn-icon">🚀</span>
            <span>Send to PC</span>
        </button>
        
        <!-- PC hint -->
        <div class="pc-hint">
            <span>💻</span> Make sure your PC is running DocS
        </div>
    </div>

    <!-- Completion Status Card -->
    <div class="status-card" id="status-card">
        <div class="status-icon-large" id="status-icon">✅</div>
        <div class="status-title" id="status-title">All done!</div>
        <div class="status-message" id="status-message">Files transferred successfully</div>
        <div class="status-note" id="status-note">✨ Your PC will index them automatically</div>
    </div>

</div>

<script>
const input = document.getElementById('file-input');
const fileList = document.getElementById('file-list');
const sendBtn = document.getElementById('send-btn');
const mainCard = document.getElementById('main-card');
const statusCard = document.getElementById('status-card');
const fileSectionTitle = document.getElementById('file-section-title');
const fileCountSpan = document.getElementById('file-count');
const emptyState = document.getElementById('empty-state');
const statusIcon = document.getElementById('status-icon');
const statusTitle = document.getElementById('status-title');
const statusMessage = document.getElementById('status-message');
const statusNote = document.getElementById('status-note');

let files = [];

const ICONS = {
    pdf: '📄', txt: '📝', jpg: '🖼️', jpeg: '🖼️',
    png: '🖼️', csv: '📊', docx: '📘', doc: '📘', 'default': '📎'
};

function getFileIcon(filename) {
    const ext = filename.split('.').pop().toLowerCase();
    return ICONS[ext] || ICONS['default'];
}

function formatSize(bytes) {
    if (bytes < 1024) return bytes + ' B';
    if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
    return (bytes / 1048576).toFixed(1) + ' MB';
}

function updateFileUI() {
    if (files.length === 0) {
        emptyState.style.display = 'block';
        fileSectionTitle.style.display = 'none';
        sendBtn.disabled = true;
        return;
    }
    
    emptyState.style.display = 'none';
    fileSectionTitle.style.display = 'flex';
    fileCountSpan.textContent = files.length;
    sendBtn.disabled = false;
    
    fileList.innerHTML = '';
    files.forEach((f, i) => {
        const fileItem = document.createElement('div');
        fileItem.className = 'file-item';
        fileItem.innerHTML = `
            <div class="progress" id="p-${i}"></div>
            <div class="file-row">
                <div class="file-icon">${getFileIcon(f.name)}</div>
                <div class="file-info">
                    <div class="file-name" title="${f.name}">${f.name}</div>
                    <div class="file-meta">
                        <span class="file-size">${formatSize(f.size)}</span>
                    </div>
                </div>
                <div class="file-status" id="s-${i}">⏳</div>
            </div>
        `;
        fileList.appendChild(fileItem);
    });
}

input.onchange = () => {
    files = Array.from(input.files);
    updateFileUI();
};

// Drag & Drop enhancement
const dropZone = document.querySelector('.drop-zone');
if (dropZone) {
    ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
        dropZone.addEventListener(eventName, (e) => {
            e.preventDefault();
            e.stopPropagation();
        });
    });
    
    ['dragenter', 'dragover'].forEach(eventName => {
        dropZone.addEventListener(eventName, () => {
            dropZone.style.borderColor = '#FF85BB';
            dropZone.style.background = 'rgba(255, 133, 187, 0.05)';
        });
    });
    
    ['dragleave', 'drop'].forEach(eventName => {
        dropZone.addEventListener(eventName, () => {
            dropZone.style.borderColor = 'rgba(2, 26, 84, 0.2)';
            dropZone.style.background = '#FFFFFF';
        });
    });
    
    dropZone.addEventListener('drop', (e) => {
        const dt = e.dataTransfer;
        const droppedFiles = Array.from(dt.files);
        if (droppedFiles.length) {
            files = droppedFiles;
            const dataTransfer = new DataTransfer();
            droppedFiles.forEach(f => dataTransfer.items.add(f));
            input.files = dataTransfer.files;
            updateFileUI();
        }
    });
}

sendBtn.onclick = async () => {
    if (files.length === 0) return;
    
    // Animate to status
    mainCard.classList.add('fade-out');
    
    setTimeout(() => {
        mainCard.style.display = 'none';
        statusCard.style.display = 'block';
    }, 300);
    
    let successCount = 0;
    
    for (let i = 0; i < files.length; i++) {
        const fd = new FormData();
        fd.append('file', files[i]);
        
        await new Promise(resolve => {
            const xhr = new XMLHttpRequest();
            
            xhr.upload.onprogress = e => {
                if (e.lengthComputable) {
                    const progDiv = document.getElementById(`p-${i}`);
                    if (progDiv) {
                        progDiv.style.width = (e.loaded / e.total * 100) + '%';
                    }
                }
            };
            
            xhr.onload = () => {
                const statusSpan = document.getElementById(`s-${i}`);
                if (statusSpan) statusSpan.textContent = '✅';
                if (xhr.status === 200) successCount++;
                resolve();
            };
            
            xhr.onerror = () => {
                const statusSpan = document.getElementById(`s-${i}`);
                if (statusSpan) statusSpan.textContent = '❌';
                resolve();
            };
            
            xhr.open('POST', '/mobile/upload');
            xhr.send(fd);
        });
    }
    
    // Notify completion
    try {
        await fetch('/mobile/transfer-complete', { method: 'POST' });
    } catch(e) {
        console.warn("Completion notification failed", e);
    }
    
    // Update status card based on results
    if (successCount === files.length) {
        statusIcon.textContent = '✅';
        statusTitle.textContent = `${successCount} file${successCount !== 1 ? 's' : ''} sent!`;
        statusMessage.textContent = 'All files transferred successfully';
        statusNote.textContent = '✨ Your PC will now index and process them automatically';
    } else {
        statusIcon.textContent = '⚠️';
        statusTitle.textContent = `${successCount} / ${files.length} sent`;
        statusMessage.textContent = 'Some files failed to transfer';
        statusNote.textContent = 'Check your connection and try again for failed files';
    }
};

// Initial UI state
updateFileUI();
</script>

</body>
</html>
